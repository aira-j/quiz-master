<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results — Quiz Master</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .result-header { text-align: center; padding: 2rem 0; }
        .score-circle { width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-family: 'Outfit', sans-serif; font-size: 2.5rem; font-weight: 800; border: 4px solid var(--accent-primary); background: rgba(99,102,241,0.1); }
        .breakdown-item { background: var(--bg-glass); border: 1px solid var(--border-glass); border-radius: var(--radius-md); padding: 1.25rem; margin-bottom: 0.75rem; }
        .breakdown-item.correct { border-left: 4px solid var(--success); }
        .breakdown-item.incorrect { border-left: 4px solid var(--danger); }
        .breakdown-item.pending { border-left: 4px solid var(--warning); }
    </style>
</head>
<body>
    <div class="page-container">
        <nav class="navbar">
            <a href="/" class="navbar-brand">⚡ Quiz Master</a>
            <div class="navbar-links">
                <a href="/dashboard">Dashboard</a>
                <button onclick="logout()">Logout</button>
            </div>
        </nav>

        <div class="page-content medium">
            <div id="loading" class="loading-overlay"><div class="spinner"></div></div>
            <div id="results" class="hidden">
                <div class="result-header">
                    <h1 id="quiz-title">Quiz Results</h1>
                    <div class="score-circle" id="score-display">-</div>
                    <div class="stat-row" style="max-width: 500px; margin: 0 auto;">
                        <div class="stat-card"><div class="stat-value" id="rank-display">-</div><div class="stat-label">Rank</div></div>
                        <div class="stat-card"><div class="stat-value" id="time-display">-</div><div class="stat-label">Time Taken</div></div>
                    </div>
                    <div class="mt-2" id="auto-submit-badge"></div>
                </div>

                <div class="flex justify-between items-center mb-2">
                    <h2>Question Breakdown</h2>
                    <a id="leaderboard-link" href="#" class="btn btn-secondary btn-sm">🏆 Leaderboard</a>
                </div>
                <div id="breakdown-container"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/utils.js"></script>
    <script>
        const submissionId = window.location.pathname.split('/').pop();

        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuthAndRedirect();
            if (!user) return;

            const res = await fetchAPI(`/api/grading/${submissionId}/result`);
            if (!res || !res.ok) {
                showToast('Could not load results', 'error');
                return;
            }

            const data = await res.json();
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');

            document.getElementById('quiz-title').textContent = data.quiz_title;
            document.getElementById('score-display').textContent = data.score.toFixed(1);
            document.getElementById('rank-display').textContent = `${data.rank}/${data.total_participants}`;
            document.getElementById('time-display').textContent = formatTime(data.time_taken);
            document.getElementById('leaderboard-link').href = `/leaderboard/${data.quiz_id}`;

            if (data.auto_submitted) {
                document.getElementById('auto-submit-badge').innerHTML = '<span class="badge badge-danger">Auto-Submitted (Violations)</span>';
            }

            // Render breakdown
            const container = document.getElementById('breakdown-container');
            container.innerHTML = data.breakdown.map((q, i) => {
                let status = 'pending';
                let statusLabel = '⏳ Pending Review';
                if (q.is_correct === true) { status = 'correct'; statusLabel = '✓ Correct'; }
                else if (q.is_correct === false) { status = 'incorrect'; statusLabel = '✗ Incorrect'; }

                let answerDetail = '';
                if (q.question_type === 'text') {
                    answerDetail = `<p class="mt-1 text-muted">Your answer: ${q.text_response || '(blank)'}</p>`;
                    if (q.admin_score !== null) {
                        answerDetail += `<p class="mt-1">Admin score: <strong>${q.admin_score}</strong></p>`;
                    }
                } else {
                    const selectedNames = q.options.filter(o => (q.selected_options || []).includes(o.id)).map(o => o.text);
                    const correctNames = q.options.filter(o => o.is_correct).map(o => o.text);
                    answerDetail = `
                        <p class="mt-1 text-muted">Your answer: ${selectedNames.join(', ') || '(none)'}</p>
                        <p class="mt-1" style="color: var(--success);">Correct: ${correctNames.join(', ')}</p>`;
                }

                return `
                    <div class="breakdown-item ${status}">
                        <div class="flex justify-between items-center">
                            <strong>Q${i + 1}: ${q.question_text}</strong>
                            <span class="badge badge-${status === 'correct' ? 'success' : status === 'incorrect' ? 'danger' : 'warning'}">${statusLabel}</span>
                        </div>
                        ${answerDetail}
                    </div>`;
            }).join('');
        });
    </script>
</body>
</html>
