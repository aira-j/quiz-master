<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Quiz Platform</title>
    <meta name="description" content="Create your account to take quizzes">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">⚡ QuizPlatform</div>
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Register to take quizzes</p>

            <form id="register-form">
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="Your name" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login">Sign in</a>
            </div>
        </div>
    </div>

    <script src="/static/js/utils.js"></script>
    <script>
        // Preserve the quiz redirect URL if present
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get('redirect');

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                    }),
                });

                const data = await res.json();
                if (res.ok) {
                    setToken(data.access_token);
                    showToast('Account created!', 'success');
                    setTimeout(() => {
                        window.location.href = redirect || '/dashboard';
                    }, 300);
                } else {
                    showToast(data.detail || 'Registration failed', 'error');
                }
            } catch (err) {
                showToast('Connection error', 'error');
            }

            btn.disabled = false;
            btn.textContent = 'Create Account';
        });
    </script>
</body>
</html>
