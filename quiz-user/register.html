<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Quiz Master</title>
    <meta name="description" content="Create your account for Quiz Master">
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .role-toggle { display: flex; gap: 0; margin-bottom: 2rem; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-glass); }
        .role-btn { flex: 1; padding: 0.75rem 1rem; text-align: center; font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.9rem; cursor: pointer; background: var(--bg-glass); color: var(--text-secondary); border: none; transition: var(--transition); }
        .role-btn.active { background: var(--accent-gradient); color: #fff; }
        .role-btn:hover:not(.active) { background: rgba(99,102,241,0.1); color: var(--text-primary); }
        .role-icon { font-size: 1.1rem; margin-right: 0.4rem; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">⚡ Quiz Master</div>
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle" id="auth-subtitle">Register to take quizzes</p>

            <!-- Role Toggle -->
            <div class="role-toggle">
                <button class="role-btn active" id="btn-student" onclick="setRole('participant')">
                    <span class="role-icon">🎓</span> Student
                </button>
                <button class="role-btn" id="btn-admin" onclick="setRole('admin')">
                    <span class="role-icon">🛡️</span> Admin
                </button>
            </div>

            <form id="register-form">
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="Your name" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">Register as Student</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login">Sign in</a>
            </div>
        </div>
    </div>

    <script src="/static/js/utils.js"></script>
    <script>
        let selectedRole = 'participant';

        function setRole(role) {
            selectedRole = role;
            document.getElementById('btn-student').classList.toggle('active', role === 'participant');
            document.getElementById('btn-admin').classList.toggle('active', role === 'admin');
            document.getElementById('submit-btn').textContent = role === 'admin' ? 'Register as Admin' : 'Register as Student';
            document.getElementById('auth-subtitle').textContent = role === 'admin' ? 'Register to manage quizzes' : 'Register to take quizzes';
        }

        // Preserve the quiz redirect URL if present
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get('redirect');

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            const originalText = btn.textContent;
            btn.textContent = 'Creating account...';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                        role: selectedRole,
                    }),
                });

                const data = await res.json();
                if (res.ok) {
                    setToken(data.access_token);
                    showToast('Account created!', 'success');
                    setTimeout(() => {
                        window.location.href = selectedRole === 'admin' ? '/admin' : (redirect || '/dashboard');
                    }, 300);
                } else {
                    showToast(data.detail || 'Registration failed', 'error');
                }
            } catch (err) {
                showToast('Connection error', 'error');
            }

            btn.disabled = false;
            btn.textContent = originalText;
        });
    </script>
</body>
</html>
