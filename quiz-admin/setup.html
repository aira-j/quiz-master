<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Setup — Quiz Platform</title>
    <meta name="description" content="Set up your admin account for the Quiz Platform">
    <link rel="stylesheet" href="/admin/static/css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">⚡ QuizPlatform</div>
            <h1 class="auth-title">Welcome!</h1>
            <p class="auth-subtitle">Create your admin account to get started</p>

            <div id="already-setup" class="hidden" style="text-align:center; padding: 2rem 0;">
                <p style="font-size: 1.1rem; margin-bottom: 1rem;">✅ Admin account already exists</p>
                <a href="/login" class="btn btn-primary btn-block">Go to Login</a>
            </div>

            <form id="setup-form">
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="Your name" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="admin@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">Create Admin Account</button>
            </form>
        </div>
    </div>

    <script src="/admin/static/js/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Check if admin already exists
            try {
                const res = await fetch('/api/auth/check-setup');
                const data = await res.json();
                if (data.admin_exists) {
                    document.getElementById('setup-form').classList.add('hidden');
                    document.getElementById('already-setup').classList.remove('hidden');
                    return;
                }
            } catch (e) {}

            // If already logged in as admin, redirect
            const token = getToken();
            if (token) {
                const user = await getCurrentUser();
                if (user && user.role === 'admin') {
                    window.location.href = '/admin';
                    return;
                }
            }
        });

        document.getElementById('setup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'Creating...';

            try {
                const res = await fetch('/api/auth/admin/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                    }),
                });

                const data = await res.json();
                if (res.ok) {
                    setToken(data.access_token);
                    showToast('Admin account created!', 'success');
                    setTimeout(() => window.location.href = '/admin', 500);
                } else {
                    showToast(data.detail || 'Setup failed', 'error');
                }
            } catch (err) {
                showToast('Connection error', 'error');
            }

            btn.disabled = false;
            btn.textContent = 'Create Admin Account';
        });
    </script>
</body>
</html>
