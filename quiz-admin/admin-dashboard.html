<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Quiz Platform</title>
    <link rel="stylesheet" href="/admin/static/css/styles.css">
</head>
<body>
    <div class="page-container">
        <nav class="navbar">
            <a href="/admin" class="navbar-brand">⚡ QuizPlatform</a>
            <div class="navbar-links">
                <a href="/admin">Dashboard</a>
                <a href="/admin/quiz-builder">New Quiz</a>
                <button onclick="logout()">Logout</button>
            </div>
        </nav>

        <div class="page-content">
            <div class="flex justify-between items-center mb-3">
                <h1>Admin Dashboard</h1>
                <a href="/admin/quiz-builder" class="btn btn-primary">+ Create Quiz</a>
            </div>

            <div class="stat-row" id="stats-row">
                <div class="stat-card"><div class="stat-value" id="stat-total">-</div><div class="stat-label">Total Quizzes</div></div>
                <div class="stat-card"><div class="stat-value" id="stat-published">-</div><div class="stat-label">Published</div></div>
                <div class="stat-card"><div class="stat-value" id="stat-submissions">-</div><div class="stat-label">Total Submissions</div></div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Your Quizzes</h2>
                </div>
                <div id="quizzes-list">
                    <div class="loading-overlay"><div class="spinner"></div><span>Loading quizzes...</span></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/admin/static/js/utils.js"></script>
    <script>
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            currentUser = await checkAuthAndRedirect();
            if (!currentUser || currentUser.role !== 'admin') {
                window.location.href = '/login';
                return;
            }
            loadQuizzes();
        });

        async function loadQuizzes() {
            const res = await fetchAPI('/api/quizzes');
            if (!res || !res.ok) return;
            const quizzes = await res.json();

            document.getElementById('stat-total').textContent = quizzes.length;
            document.getElementById('stat-published').textContent = quizzes.filter(q => q.is_published).length;
            document.getElementById('stat-submissions').textContent = quizzes.reduce((s, q) => s + q.submission_count, 0);

            const container = document.getElementById('quizzes-list');
            if (quizzes.length === 0) {
                container.innerHTML = `
                    <div class="text-center" style="padding: 3rem;">
                        <p class="text-muted" style="font-size: 1.1rem; margin-bottom: 1rem;">No quizzes yet</p>
                        <a href="/admin/quiz-builder" class="btn btn-primary">Create Your First Quiz</a>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="table-container">
                    <table>
                        <thead><tr>
                            <th>Quiz</th><th>Questions</th><th>Submissions</th><th>Status</th><th>Actions</th>
                        </tr></thead>
                        <tbody>
                            ${quizzes.map(q => `
                                <tr>
                                    <td>
                                        <strong>${q.title}</strong>
                                        <div class="text-muted" style="font-size:0.8rem;">${formatDate(q.created_at)}</div>
                                    </td>
                                    <td>${q.question_count}</td>
                                    <td>${q.submission_count}</td>
                                    <td>
                                        <span class="badge ${q.is_published ? 'badge-success' : 'badge-warning'}">
                                            ${q.is_published ? 'Published' : 'Draft'}
                                        </span>
                                    </td>
                                    <td>
                                        <div class="btn-group">
                                            <a href="/admin/quiz-builder/${q.id}" class="btn btn-secondary btn-sm">Edit</a>
                                            ${q.is_published ? `<button class="btn btn-secondary btn-sm" onclick="copyShareLink('${q.share_token}')">📋 Link</button>` : ''}
                                            <a href="/admin/analytics/${q.id}" class="btn btn-secondary btn-sm">Analytics</a>
                                            <button class="btn btn-secondary btn-sm" onclick="togglePublish(${q.id})">${q.is_published ? 'Unpublish' : 'Publish'}</button>
                                            <button class="btn btn-danger btn-sm" onclick="deleteQuiz(${q.id})">Delete</button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        function copyShareLink(token) {
            copyToClipboard(window.location.origin + '/quiz/' + token);
        }

        async function togglePublish(quizId) {
            const res = await fetchAPI(`/api/quizzes/${quizId}/publish`, { method: 'POST' });
            if (res && res.ok) {
                const data = await res.json();
                showToast(data.is_published ? 'Quiz published!' : 'Quiz unpublished', 'success');
                loadQuizzes();
            } else {
                const err = await res.json();
                showToast(err.detail || 'Failed', 'error');
            }
        }

        async function deleteQuiz(quizId) {
            if (!confirm('Are you sure you want to delete this quiz? This cannot be undone.')) return;
            const res = await fetchAPI(`/api/quizzes/${quizId}`, { method: 'DELETE' });
            if (res && res.ok) {
                showToast('Quiz deleted', 'success');
                loadQuizzes();
            }
        }
    </script>
</body>
</html>
